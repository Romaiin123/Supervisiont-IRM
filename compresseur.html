<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Données Compresseur</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.card {
    position: relative;
}

.status-badge {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 1.4rem;
}

.state-indicator {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 24px auto 14px auto;
    background-color: #64748b;
    box-shadow: 0 0 14px rgba(100,116,139,0.35);
    transition: all 0.3s ease;
}

.state-indicator.on {
    background-color: #22c55e;
    box-shadow: 0 0 22px rgba(34,197,94,0.65);
}

.state-indicator.off {
    background-color: #ef4444;
    box-shadow: 0 0 22px rgba(239,68,68,0.65);
}

.state-indicator.unknown {
    background-color: #94a3b8;
    box-shadow: 0 0 20px rgba(148,163,184,0.45);
}

.state-text {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 700;
    margin-top: 8px;
    color: #e2e8f0;
}

.state-subtext {
    text-align: center;
    font-size: 0.95rem;
    color: #94a3b8;
    margin-top: 6px;
}

.timestamp {
    margin-top: 18px;
}
</style>
</head>

<body>

<header>
    Données Compresseur
</header>

<div class="nav">
    <a href="index.html" class="back-button">← Retour à l’accueil</a>
</div>

<div class="container">

    <div class="card">
        <h2>Vibration compresseur</h2>
        <div id="comp_status" class="status-badge">●</div>

        <div class="value" id="comp_amp">--</div>
        <div class="timestamp" id="comp_time"></div>

        <canvas id="comp_chart" height="120"></canvas>
    </div>

    <div class="card">
        <h2>État compresseur</h2>
        <div id="etat_status" class="status-badge">●</div>

        <div id="etat_indicator" class="state-indicator unknown"></div>
        <div class="state-text" id="etat_text">État indisponible</div>
        <div class="state-subtext" id="etat_subtext">Aucune donnée exploitable</div>
        <div class="timestamp" id="etat_time"></div>
    </div>

    <div class="card">
        <h2>Commande compresseur</h2>
        <div id="cmd_status" class="status-badge">●</div>

        <div id="cmd_indicator" class="state-indicator unknown"></div>
        <div class="state-text" id="cmd_text">Commande indisponible</div>
        <div class="state-subtext" id="cmd_subtext">Aucune donnée exploitable</div>
        <div class="timestamp" id="cmd_time"></div>
    </div>

</div>

<script>
const SUPABASE_URL = "https://xkqizqpflgcmyiqluuie.supabase.co";
const SUPABASE_KEY = "sb_publishable_87i8-j5iiLISsoBSBvC7ng_RlE5TPrr";

const DEVICE_ID = "arduino_ntc_01";
const DATA_FRESHNESS_LIMIT_MIN = 2;

/* ===== FORMAT DATE / HEURE ===== */

function formatLocalTime(utcString) {
    if (!utcString) return "--";

    const date = new Date(utcString);
    if (isNaN(date.getTime())) return "--";

    const options = {
        timeZone: "Europe/Paris",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
    };

    const parts = new Intl.DateTimeFormat("fr-FR", options).formatToParts(date);

    const year = parts.find(p => p.type === "year")?.value ?? "--";
    const month = parts.find(p => p.type === "month")?.value ?? "--";
    const day = parts.find(p => p.type === "day")?.value ?? "--";
    const hour = parts.find(p => p.type === "hour")?.value ?? "--";
    const minute = parts.find(p => p.type === "minute")?.value ?? "--";

    return `${year}-${month}-${day} à ${hour}:${minute}`;
}

function getAgeMinutes(timestamp) {
    const last = new Date(timestamp);
    if (isNaN(last.getTime())) return Infinity;
    return (Date.now() - last.getTime()) / 1000 / 60;
}

function isFresh(timestamp) {
    return getAgeMinutes(timestamp) <= DATA_FRESHNESS_LIMIT_MIN;
}

/* ===== BADGE FRAÎCHEUR ===== */

function updateStatus(badgeId, timestamp) {
    const badge = document.getElementById(badgeId);

    if (!timestamp || !isFresh(timestamp)) {
        badge.style.color = "#ef4444";
        return;
    }

    badge.style.color = "#22c55e";
}

/* ===== SUPABASE ===== */

async function fetchLatest(device) {
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&order=timestamp.desc&limit=1`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if (!response.ok) {
        throw new Error(`Erreur fetchLatest: ${response.status}`);
    }

    const data = await response.json();
    return data[0] || null;
}

async function fetchLast6Hours(device) {
    const sixHoursAgo = new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString();

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&timestamp=gte.${sixHoursAgo}&order=timestamp.asc`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if (!response.ok) {
        throw new Error(`Erreur fetchLast6Hours: ${response.status}`);
    }

    return await response.json();
}

/* ===== GRAPHIQUE ===== */

let compChart = null;

function createChart(data) {
    const ctx = document.getElementById("comp_chart").getContext("2d");

    const validData = data.filter(d => d.amplitude !== null && d.amplitude !== undefined);

    const labels = validData.map(d => {
        const date = new Date(d.timestamp);
        return date.toLocaleTimeString("fr-FR", {
            timeZone: "Europe/Paris",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        });
    });

    const values = validData.map(d => Number(d.amplitude));

    return new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Amplitude vibration",
                data: values,
                borderColor: "#f97316",
                backgroundColor: "rgba(249,115,22,0.12)",
                tension: 0.3,
                fill: true,
                pointRadius: 0,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                x: {
                    ticks: {
                        color: "#94a3b8",
                        maxRotation: 0,
                        autoSkip: true,
                        maxTicksLimit: 8
                    },
                    grid: {
                        color: "rgba(148,163,184,0.08)"
                    }
                },
                y: {
                    ticks: {
                        color: "#94a3b8"
                    },
                    grid: {
                        color: "rgba(148,163,184,0.08)"
                    }
                }
            },
            plugins: {
                legend: {
                    labels: {
                        color: "#e2e8f0"
                    }
                }
            }
        }
    });
}

/* ===== AFFICHAGE VIBRATION ===== */

function updateAmplitudeCard(comp) {
    const ampEl = document.getElementById("comp_amp");
    const timeEl = document.getElementById("comp_time");

    if (!comp || comp.amplitude === null || comp.amplitude === undefined) {
        ampEl.textContent = "--";
        timeEl.textContent = "Dernière mesure : --";
        document.getElementById("comp_status").style.color = "#ef4444";
        return;
    }

    ampEl.textContent = Number(comp.amplitude).toFixed(2);
    timeEl.textContent = "Dernière mesure : " + formatLocalTime(comp.timestamp);
    updateStatus("comp_status", comp.timestamp);
}

/* ===== AFFICHAGE ÉTAT COMPRESSEUR ===== */

function updateEtatCompresseur(value, timestamp) {
    const indicator = document.getElementById("etat_indicator");
    const text = document.getElementById("etat_text");
    const subtext = document.getElementById("etat_subtext");
    const time = document.getElementById("etat_time");

    indicator.classList.remove("on", "off", "unknown");

    if (!timestamp || !isFresh(timestamp)) {
        indicator.classList.add("unknown");
        text.textContent = "État indisponible";
        subtext.textContent = "Dernière donnée trop ancienne";
        time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
        updateStatus("etat_status", timestamp);
        return;
    }

    if (Number(value) === 1) {
        indicator.classList.add("on");
        text.textContent = "Compresseur ON";
        subtext.textContent = "";
    } else {
        indicator.classList.add("off");
        text.textContent = "Compresseur OFF";
        subtext.textContent = "";
    }

    time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
    updateStatus("etat_status", timestamp);
}

function setEtatUnavailable(timestamp = null) {
    const indicator = document.getElementById("etat_indicator");
    const text = document.getElementById("etat_text");
    const subtext = document.getElementById("etat_subtext");
    const time = document.getElementById("etat_time");

    indicator.classList.remove("on", "off");
    indicator.classList.add("unknown");

    text.textContent = "État indisponible";
    subtext.textContent = "Aucune donnée exploitable";
    time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
    updateStatus("etat_status", timestamp);
}

/* ===== AFFICHAGE COMMANDE COMPRESSEUR ===== */

function updateCommandeCompresseur(value, timestamp) {
    const indicator = document.getElementById("cmd_indicator");
    const text = document.getElementById("cmd_text");
    const subtext = document.getElementById("cmd_subtext");
    const time = document.getElementById("cmd_time");

    indicator.classList.remove("on", "off", "unknown");

    if (!timestamp || !isFresh(timestamp)) {
        indicator.classList.add("unknown");
        text.textContent = "Commande indisponible";
        subtext.textContent = "Dernière donnée trop ancienne";
        time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
        updateStatus("cmd_status", timestamp);
        return;
    }

    if (Number(value) === 1) {
        indicator.classList.add("on");
        text.textContent = "Commande MARCHE";
        subtext.textContent = "Ordre envoyé : tourner";
    } else {
        indicator.classList.add("off");
        text.textContent = "Commande ARRÊT";
        subtext.textContent = "Ordre envoyé : ne pas tourner";
    }

    time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
    updateStatus("cmd_status", timestamp);
}

function setCommandeUnavailable(timestamp = null) {
    const indicator = document.getElementById("cmd_indicator");
    const text = document.getElementById("cmd_text");
    const subtext = document.getElementById("cmd_subtext");
    const time = document.getElementById("cmd_time");

    indicator.classList.remove("on", "off");
    indicator.classList.add("unknown");

    text.textContent = "Commande indisponible";
    subtext.textContent = "Aucune donnée exploitable";
    time.textContent = "Dernière mesure : " + formatLocalTime(timestamp);
    updateStatus("cmd_status", timestamp);
}

/* ===== REFRESH ===== */

async function refreshValues() {
    try {
        const comp = await fetchLatest(DEVICE_ID);

        if (!comp) {
            updateAmplitudeCard(null);
            setEtatUnavailable(null);
            setCommandeUnavailable(null);
            return;
        }

        updateAmplitudeCard(comp);

        if (comp.comptfetat !== null && comp.comptfetat !== undefined) {
            updateEtatCompresseur(comp.comptfetat, comp.timestamp);
        } else {
            setEtatUnavailable(comp.timestamp);
        }

        if (comp.commande_compresseur !== null && comp.commande_compresseur !== undefined) {
            updateCommandeCompresseur(comp.commande_compresseur, comp.timestamp);
        } else {
            setCommandeUnavailable(comp.timestamp);
        }

    } catch (error) {
        console.error(error);
        updateAmplitudeCard(null);
        setEtatUnavailable(null);
        setCommandeUnavailable(null);
    }
}

async function loadChart() {
    try {
        const data = await fetchLast6Hours(DEVICE_ID);

        if (compChart) {
            compChart.destroy();
        }

        compChart = createChart(data || []);
    } catch (error) {
        console.error(error);
    }
}

/* ===== TIMERS ===== */

refreshValues();
loadChart();

setInterval(refreshValues, 30000);
setInterval(loadChart, 60000);
</script>

</body>
</html>
