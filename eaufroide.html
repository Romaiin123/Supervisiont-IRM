<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Données eau froide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.card { position: relative; }

.status-badge {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 1.4rem;
}
</style>
</head>

<body>

<header>
    Données eau froide
</header>

<div class="nav">
    <a href="index.html" class="back-button">← Retour à l’accueil</a>
</div>

<div class="container">

    <div class="card">
        <h2>Température eau glacée (NTC)</h2>
        <div id="ntc_status" class="status-badge">●</div>

        <div class="value" id="water_temp">-- °C</div>
        <div class="timestamp" id="water_time"></div>

        <canvas id="water_chart" height="120"></canvas>
    </div>

</div>

<script>

const SUPABASE_URL = "https://xkqizqpflgcmyiqluuie.supabase.co";
const SUPABASE_KEY = "sb_publishable_87i8-j5iiLISsoBSBvC7ng_RlE5TPrr";

function formatLocalTime(utcString) {
    const date = new Date(utcString);

    const options = {
        timeZone: "Europe/Paris",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
    };

    const parts = new Intl.DateTimeFormat("fr-FR", options)
        .formatToParts(date);

    const year = parts.find(p => p.type === "year").value;
    const month = parts.find(p => p.type === "month").value;
    const day = parts.find(p => p.type === "day").value;
    const hour = parts.find(p => p.type === "hour").value;
    const minute = parts.find(p => p.type === "minute").value;

    return `${year}-${month}-${day} à ${hour}:${minute}`;
}

function updateStatus(badgeId, timestamp) {
    const now = new Date();
    const last = new Date(timestamp);
    const diffMinutes = (now - last) / 1000 / 60;

    const badge = document.getElementById(badgeId);

    if (diffMinutes <= 2) {
        badge.style.color = "#22c55e";
    } else {
        badge.style.color = "#ef4444";
    }
}

async function fetchLatest(device) {
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&order=timestamp.desc&limit=1`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await response.json();
    return data[0];
}

async function fetchLast6Hours(device) {
    const sixHoursAgo = new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString();

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&timestamp=gte.${sixHoursAgo}&order=timestamp.asc`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    return await response.json();
}

let waterChart;

function createChart(data) {

    const ctx = document.getElementById("water_chart").getContext("2d");

    const labels = data.map(d => {
        const date = new Date(d.timestamp);
        return date.toLocaleTimeString("fr-FR", {
            timeZone: "Europe/Paris",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        });
    });

    const values = data.map(d => d.temperature);

    return new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Température eau glacée",
                data: values,
                borderColor: "#3b82f6",
                backgroundColor: "rgba(59,130,246,0.1)",
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    ticks: {
                        color: "#94a3b8",
                        maxRotation: 0,
                        autoSkip: true,
                        maxTicksLimit: 8
                    }
                },
                y: {
                    min: 6,
                    max: 12,
                    ticks: {
                        color: "#94a3b8"
                    }
                }
            },
            plugins: {
                legend: {
                    labels: { color: "#e2e8f0" }
                }
            }
        }
    });
}

async function refreshValues() {
    const ntc = await fetchLatest("arduino_ntc_01");

    if (ntc) {
        document.getElementById("water_temp").textContent =
            ntc.temperature.toFixed(2) + " °C";

        document.getElementById("water_time").textContent =
            "Dernière mesure : " + formatLocalTime(ntc.timestamp);

        updateStatus("ntc_status", ntc.timestamp);
    }
}

async function loadChart() {
    const data = await fetchLast6Hours("arduino_ntc_01");

    if (waterChart) waterChart.destroy();

    waterChart = createChart(data);
}

refreshValues();
loadChart();

setInterval(refreshValues, 30000);
setInterval(loadChart, 60000);

</script>

</body>
</html>
