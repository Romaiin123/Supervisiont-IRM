<!DOCTYPE html>
<!-- Déclaration HTML5 -->

<html lang="fr">
<!-- Langue du document : français (important pour accessibilité et SEO) -->

<head>
<meta charset="UTF-8">
<!-- Encodage UTF-8 pour gérer correctement les caractères spéciaux -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Permet le responsive design sur mobile -->

<title>Centre IRM – Supervision</title>
<!-- Titre affiché dans l’onglet navigateur -->

<!-- Import de la police Inter depuis Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===============================
   STYLE GLOBAL
   =============================== */

body {
    margin: 0;                     /* Supprime les marges par défaut du navigateur */
    font-family: "Inter", sans-serif; 
    background: #f1f5f9;            /* Couleur de fond gris clair */
    color: #1e293b;                 /* Couleur principale du texte */
}

/* ===============================
   HEADER
   =============================== */

header {
    background: #ffffff;            /* Fond blanc */
    padding: 30px 50px;             /* Espacement interne */
    display: flex;                  /* Layout horizontal */
    align-items: center;            /* Alignement vertical centré */
    gap: 20px;                      /* Espace entre logo et titre */
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    /* Ombre légère pour effet de profondeur */
}

header img {
    height: 70px;                   /* Taille du logo */
}

header h1 {
    margin: 0;                      /* Supprime marge par défaut */
    font-size: 1.8rem;              /* Taille relative */
    font-weight: 600;               /* Semi-bold */
}

/* ===============================
   CONTENEUR PRINCIPAL
   =============================== */

.container {
    max-width: 1100px;              /* Largeur maximale centrée */
    margin: 80px auto;              /* Centre horizontalement + marge verticale */
    padding: 0 20px;                /* Padding latéral */
    display: grid;                  /* Utilisation CSS Grid */
    gap: 40px;                      /* Espace entre les blocs */
}

/* ===============================
   BLOCS CLIQUABLES (CARTES)
   =============================== */

.card {
    background: #2563eb;            /* Bleu principal */
    color: white;                   /* Texte blanc */
    padding: 50px;                  /* Espace interne */
    border-radius: 24px;            /* Coins arrondis */
    text-decoration: none;          /* Supprime le soulignement des liens */
    transition: all 0.3s ease;      /* Animation fluide */
    box-shadow: 0 15px 40px rgba(37,99,235,0.35);
    /* Ombre importante pour effet "carte" */
}

.card h2 {
    margin: 0 0 10px 0;             /* Espace sous le titre */
    font-size: 1.6rem;
}

.card p {
    margin: 0;
    opacity: 0.9;                   /* Léger effet atténué */
}

/* ===============================
   EFFET AU SURVOL
   =============================== */

.card:hover {
    transform: translateY(-8px);
    /* Déplacement vertical léger vers le haut */

    box-shadow: 0 0 25px rgba(37,99,235,0.8),
                0 20px 50px rgba(37,99,235,0.5);
    /* Glow + ombre accentuée */
}

/* ===============================
   VARIATION COULEUR PAR BLOC
   =============================== */

.card:nth-child(2) {
    background: #1d4ed8;            /* Bleu plus foncé */
    box-shadow: 0 15px 40px rgba(29,78,216,0.35);
}

.card:nth-child(3) {
    background: #1e40af;            /* Encore plus foncé */
    box-shadow: 0 15px 40px rgba(30,64,175,0.35);
}

/* ===============================
   FOOTER
   =============================== */

footer {
    text-align: center;
    padding: 40px;
    color: #64748b;                 /* Gris secondaire */
    font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- ===============================
     HEADER VISUEL
     =============================== -->

<header>
    <!-- Logo local (doit être dans le même dossier que index.html) -->
    <img src="Logo_IRM_150.png" alt="Logo IRM">
    <h1>Système de Supervision IRM</h1>
</header>

<!-- ===============================
     MENU PRINCIPAL
     =============================== -->

<div class="container">

    <!-- Bloc 1 : Supervision atmosphérique -->
    <a href="atmosphere.html" class="card">
        <h2>Données atmosphériques</h2>
        <p>Température – Pression – Humidité</p>
    </a>

    <!-- Bloc 2 : Circuit eau glacée -->
    <a href="eaufroide.html" class="card">
        <h2>Données eau glacée</h2>
        <p>Température circuit de refroidissement</p>
    </a>

    <!-- Bloc 3 : Compresseur -->
    <a href="compresseur.html" class="card">
        <h2>Données Compresseur</h2>
        <p>Vibration compresseur</p>
    </a>
	<!-- Bloc 4 : Groupe froid -->
	<a href="groupefroid.html" class="card">
    <h2>Données Groupe Froid</h2>
    <p>État ON/OFF – Surveillance fonctionnement</p>
	</a>

</div>

<!-- ===============================
     FOOTER
     =============================== -->

<footer>
    Plateforme IRM – INT | Supervision technique
</footer>

</body>
</html>
