<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Données atmosphériques</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.card { 
    position: relative; 
}

.status-badge {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 1.4rem;
}

canvas {
    margin-top: 20px;
}

.chart-controls {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.chart-controls label {
    color: #e2e8f0;
    font-weight: 600;
}

.chart-controls select {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: #0f172a;
    color: #e2e8f0;
    font-size: 0.95rem;
}
</style>
</head>

<body>

<header>
    Données atmosphériques
</header>

<div class="nav">
    <a href="index.html" class="back-button">← Retour à l’accueil</a>
</div>

<div class="container">

    <div class="card">
        <h2>Arduino Atmo</h2>
        <div id="atmo_status" class="status-badge">●</div>

        <div class="value" id="atmo_temp">Température : --</div>
        <div class="value" id="atmo_hum">Humidité : --</div>
        <div class="value" id="atmo_press">Pression : --</div>
        <div class="timestamp" id="atmo_time"></div>

        <div class="chart-controls">
            <label for="temp_range_select">Plage température :</label>
            <select id="temp_range_select">
                <option value="24">24 h</option>
                <option value="48">48 h</option>
                <option value="72">3 jours</option>
                <option value="96">4 jours</option>
            </select>
        </div>

        <canvas id="atmo_chart" height="120"></canvas>
        <canvas id="atmo_hum_chart" height="120"></canvas>
        <canvas id="atmo_press_chart" height="120"></canvas>
    </div>

</div>

<script>
const SUPABASE_URL = "https://xkqizqpflgcmyiqluuie.supabase.co";
const SUPABASE_KEY = "sb_publishable_87i8-j5iiLISsoBSBvC7ng_RlE5TPrr";

function formatLocalTime(utcString) {
    const date = new Date(utcString);

    const options = {
        timeZone: "Europe/Paris",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
    };

    const parts = new Intl.DateTimeFormat("fr-FR", options).formatToParts(date);

    const year = parts.find(p => p.type === "year").value;
    const month = parts.find(p => p.type === "month").value;
    const day = parts.find(p => p.type === "day").value;
    const hour = parts.find(p => p.type === "hour").value;
    const minute = parts.find(p => p.type === "minute").value;

    return `${year}-${month}-${day} à ${hour}:${minute}`;
}

function updateStatus(badgeId, timestamp) {
    const now = new Date();
    const last = new Date(timestamp);
    const diffMinutes = (now - last) / 1000 / 60;

    const badge = document.getElementById(badgeId);

    if (diffMinutes <= 2) {
        badge.style.color = "#22c55e";
    } else {
        badge.style.color = "#ef4444";
    }
}

async function fetchLatest(device) {
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&order=timestamp.desc&limit=1`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await response.json();
    return data[0];
}

async function fetchRange(device, hours) {
    const startDate = new Date(Date.now() - hours * 60 * 60 * 1000).toISOString();

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/measurements?device_id=eq.${device}&timestamp=gte.${startDate}&order=timestamp.asc`,
        {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    return await response.json();
}

let atmoChart;
let atmoHumChart;
let atmoPressChart;
let currentTempRangeHours = 24;

function buildLabels(data, hours) {
    return data.map(d => {
        const date = new Date(d.timestamp);

        if (hours <= 48) {
            return date.toLocaleString("fr-FR", {
                timeZone: "Europe/Paris",
                day: "2-digit",
                month: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            });
        }

        return date.toLocaleString("fr-FR", {
            timeZone: "Europe/Paris",
            day: "2-digit",
            month: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        });
    });
}

function createChart(canvasId, data, label, field, borderColor, backgroundColor, hours = 24) {
    const ctx = document.getElementById(canvasId).getContext("2d");

    const labels = buildLabels(data, hours);
    const values = data.map(d => d[field]);

    return new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: values,
                borderColor: borderColor,
                backgroundColor: backgroundColor,
                tension: 0.3,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                x: {
                    ticks: {
                        color: "#94a3b8",
                        maxRotation: 0,
                        autoSkip: true,
                        maxTicksLimit: 10
                    },
                    grid: {
                        color: "rgba(148, 163, 184, 0.15)"
                    }
                },
                y: {
                    ticks: {
                        color: "#94a3b8"
                    },
                    grid: {
                        color: "rgba(148, 163, 184, 0.15)"
                    }
                }
            },
            plugins: {
                legend: {
                    labels: {
                        color: "#e2e8f0"
                    }
                }
            }
        }
    });
}

async function refreshValues() {
    const atmo = await fetchLatest("arduino_atmo");

    if (atmo) {
        document.getElementById("atmo_temp").textContent =
            "Température : " + Number(atmo.temperature).toFixed(1) + " °C";
        document.getElementById("atmo_hum").textContent =
            "Humidité : " + Number(atmo.humidity).toFixed(1) + " %";
        document.getElementById("atmo_press").textContent =
            "Pression : " + Number(atmo.pressure).toFixed(1) + " hPa";
        document.getElementById("atmo_time").textContent =
            "Dernière mesure : " + formatLocalTime(atmo.timestamp);

        updateStatus("atmo_status", atmo.timestamp);
    }
}

async function loadTemperatureChart() {
    const atmoData = await fetchRange("arduino_atmo", currentTempRangeHours);

    if (atmoChart) atmoChart.destroy();

    atmoChart = createChart(
        "atmo_chart",
        atmoData,
        "Température (°C)",
        "temperature",
        "#3b82f6",
        "rgba(59,130,246,0.1)",
        currentTempRangeHours
    );
}

async function loadFixedCharts() {
    const atmoData = await fetchRange("arduino_atmo", 24);

    if (atmoHumChart) atmoHumChart.destroy();
    if (atmoPressChart) atmoPressChart.destroy();

    atmoHumChart = createChart(
        "atmo_hum_chart",
        atmoData,
        "Humidité (%)",
        "humidity",
        "#22c55e",
        "rgba(34,197,94,0.1)",
        24
    );

    atmoPressChart = createChart(
        "atmo_press_chart",
        atmoData,
        "Pression (hPa)",
        "pressure",
        "#ef4444",
        "rgba(239,68,68,0.1)",
        24
    );
}

document.getElementById("temp_range_select").addEventListener("change", async function () {
    currentTempRangeHours = Number(this.value);
    await loadTemperatureChart();
});

async function initPage() {
    await refreshValues();
    await loadTemperatureChart();
    await loadFixedCharts();
}

initPage();

setInterval(refreshValues, 30000);
setInterval(async () => {
    if (currentTempRangeHours === 24) {
        await loadTemperatureChart();
    }
    await loadFixedCharts();
}, 300000);
</script>

</body>
</html>
